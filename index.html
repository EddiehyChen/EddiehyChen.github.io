<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asteroid Shooter</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    text-align:center;
    font-family:Arial;
}

canvas{
    background:#000;
    display:block;
    margin:auto;
    border:2px solid white;
}

button{
    margin-top:10px;
    padding:10px 20px;
    font-size:16px;
    display:none;
}
</style>

</head>
<body>

<h2>Asteroid Shooter</h2>
<p>Move: ← → | Shoot: Space</p>

<canvas id="game" width="600" height="500"></canvas>
<br>
<button id="replayBtn">Replay</button>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const replayBtn = document.getElementById("replayBtn");

let player;
let bullets;
let asteroids;
let keys = {};
let score;
let gameOver;

function initGame(){

    player = {
        x:280,
        y:460,
        width:40,
        height:30,
        speed:6
    };

    bullets = [];
    asteroids = [];
    score = 0;
    gameOver = false;

    replayBtn.style.display = "none";
}

initGame();

document.addEventListener("keydown", e=>{
    keys[e.code] = true;

    if(e.code === "Space" && !gameOver){
        bullets.push({
            x: player.x + player.width/2 -2,
            y: player.y,
            width:8,
            height:10,
            speed:8
        });
    }
});

document.addEventListener("keyup", e=>{
    keys[e.code] = false;
});

function spawnAsteroid(){

    asteroids.push({
        x: Math.random()*(canvas.width-30),
        y: -30,
        size: 50,
        speed: 0 + Math.random()*2
    });
}

function update(){

    if(gameOver) return;

    if(keys["ArrowLeft"] && player.x > 0)
        player.x -= player.speed;

    if(keys["ArrowRight"] && player.x + player.width < canvas.width)
        player.x += player.speed;

    bullets.forEach(b => b.y -= b.speed);
    bullets = bullets.filter(b => b.y > -20);

    asteroids.forEach(a => a.y += a.speed);

    bullets.forEach(b=>{
        asteroids.forEach(a=>{
            if(
                b.x < a.x + a.size &&
                b.x + b.width > a.x &&
                b.y < a.y + a.size &&
                b.y + b.height > a.y
            ){
                a.y = canvas.height + 100;
                b.y = -100;
                score += 10;
            }
        });
    });

    asteroids = asteroids.filter(a => a.y < canvas.height + 40);

    asteroids.forEach(a=>{
        if(
            player.x < a.x + a.size &&
            player.x + player.width > a.x &&
            player.y < a.y + a.size &&
            player.y + player.height > a.y
        ){
            gameOver = true;
            replayBtn.style.display = "inline-block";
        }
    });

    if(Math.random() < 0.02)
        spawnAsteroid();
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "lime";
    ctx.fillRect(player.x, player.y, player.width, player.height);

    ctx.fillStyle = "yellow";
    bullets.forEach(b=>{
        ctx.fillRect(b.x,b.y,b.width,b.height);
    });

    ctx.fillStyle = "gray";
    asteroids.forEach(a=>{
        ctx.beginPath();
        ctx.arc(a.x + a.size/2, a.y + a.size/2, a.size/2, 0, Math.PI*2);
        ctx.fill();
    });

    ctx.fillStyle = "white";
    ctx.fillText("Score: " + score, 10, 20);

    if(gameOver){
        ctx.font = "40px Arial";
        ctx.fillStyle = "red";
        ctx.fillText("GAME OVER", canvas.width/2 - 140, canvas.height/2);
        ctx.font = "16px Arial";
    }
}

function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

replayBtn.onclick = initGame;

gameLoop();

</script>

</body>
</html>
