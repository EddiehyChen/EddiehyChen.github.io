<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Space Invaders</title>
<style>
body {
    margin: 0;
    background: black;
    color: white;
    text-align: center;
    font-family: Arial, sans-serif;
}

canvas {
    background: #000;
    display: block;
    margin: auto;
    border: 2px solid white;
}
</style>
</head>
<body>

<h2>Space Invaders</h2>
<p>Move: ← → | Shoot: Space</p>
<canvas id="gameCanvas" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player = {
    x: canvas.width / 2 - 20,
    y: canvas.height - 40,
    width: 40,
    height: 20,
    speed: 5
};

let bullets = [];
let enemies = [];
let enemyDirection = 1;
let score = 0;

for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 8; c++) {
        enemies.push({
            x: 60 + c * 60,
            y: 40 + r * 40,
            width: 30,
            height: 20,
            alive: true
        });
    }
}

let keys = {};

document.addEventListener("keydown", e => {
    keys[e.code] = true;

    if (e.code === "Space") {
        bullets.push({
            x: player.x + player.width / 2 - 2,
            y: player.y,
            width: 4,
            height: 10,
            speed: 7
        });
    }
});

document.addEventListener("keyup", e => {
    keys[e.code] = false;
});

function update() {

    if (keys["ArrowLeft"] && player.x > 0)
        player.x -= player.speed;

    if (keys["ArrowRight"] && player.x + player.width < canvas.width)
        player.x += player.speed;

    bullets.forEach(b => b.y -= b.speed);
    bullets = bullets.filter(b => b.y > 0);

    let moveDown = false;

    enemies.forEach(e => {
        if (!e.alive) return;

        e.x += enemyDirection * 1;

        if (e.x + e.width > canvas.width || e.x < 0)
            moveDown = true;
    });

    if (moveDown) {
        enemyDirection *= -1;
        enemies.forEach(e => e.y += 20);
    }

    bullets.forEach(b => {
        enemies.forEach(e => {
            if (e.alive &&
                b.x < e.x + e.width &&
                b.x + b.width > e.x &&
                b.y < e.y + e.height &&
                b.y + b.height > e.y) {

                e.alive = false;
                b.y = -100;
                score += 10;
            }
        });
    });
}

function draw() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "lime";
    ctx.fillRect(player.x, player.y, player.width, player.height);

    ctx.fillStyle = "yellow";
    bullets.forEach(b => {
        ctx.fillRect(b.x, b.y, b.width, b.height);
    });

    ctx.fillStyle = "red";
    enemies.forEach(e => {
        if (e.alive)
            ctx.fillRect(e.x, e.y, e.width, e.height);
    });

    ctx.fillStyle = "white";
    ctx.fillText("Score: " + score, 10, 20);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
